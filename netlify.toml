[build]
  command   = "npm run build"
  publish   = "out"
  functions = "netlify/functions"

# Route PayU callbacks to Netlify Functions
[[redirects]]
  from   = "/api/payment/payu-success"
  to     = "/.netlify/functions/payu-success"
  status = 200

[[redirects]]
  from   = "/api/payment/payu-failure"
  to     = "/.netlify/functions/payu-failure"
  status = 200

# SPA fallback — let Next.js handle 404 for unknown paths
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
